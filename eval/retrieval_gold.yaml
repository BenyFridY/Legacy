    banco: Itau
    periodo: "4T25"
    tipo_doc: release
    question: "qual o saldo da carteira de credito consignado do Itau no 4T25"
    gold_paginas: [7, 21]
    dificuldade: facil
    note: "Termo 'consignado' presente: tabela de carteira (pag.7) e destaque (pag.21, R$75,3 bi)."

