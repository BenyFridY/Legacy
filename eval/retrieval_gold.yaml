# GOLD de RETRIEVAL — sondagens ancoradas em documentos REALMENTE ingeridos.
#
# Diferente de eval/questions.yaml (que mede COMPORTAMENTO de sistema: responder/recusar/
# fidelidade), este arquivo mede a QUALIDADE do RETRIEVAL de forma granular: dada a pergunta,
# a PAGINA-resposta aparece no top-k? (hit@k / MRR — ver legacy_rag/eval/retrieval.py).
#
# Metodo anti-circularidade: o gold (paginas) foi curado por busca LEXICAL + leitura do doc,
# INDEPENDENTE do embedding. O retrieval semantico e medido CONTRA esse gabarito — por isso
# pode (e deve) tirar menos que 100%. Inclui de proposito 2 sondagens dificeis (giria,
# parafrase) que sabemos que tropecam: um eval honesto nao faz cherry-picking.
#
# gold_paginas = "qualquer chunk dessas paginas conta como acerto" (a pagina e a ancora da
# citacao; chunk_id muda se reingerir, pagina nao). Cresce conforme o corpus cresce.
#
# Schema:
#   id, banco, periodo, tipo_doc, question, gold_paginas, dificuldade (facil|media|dificil), note

corpus_observacao: "Corpus heterogeneo: Itau (4T25/3T25/1T26), Bradesco (release+transcricao), BB (release+sumario), Santander, Bacen (notas). As sondagens cobrem varios BANCOS e TIPOS (inclui doc curto e transcricao)."

